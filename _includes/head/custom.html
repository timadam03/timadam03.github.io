<style>
/* Google Fonts */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap');

/* Color palette */
:root {
  --ink: #191714;
  --ink-soft: #38342d;

  --secondary-text: var(--muted);
  --background: var(--paper);
  --background-light: var(--paper-light);
}

/* Base */
html {
  background: var(--background);
  scroll-behavior: smooth;
}

body {

}

  border-bottom: 1px solid rgba(216, 208, 194, 0.78);

}

.masthead__inner-wrap {
  width: min(80vw, 1280px);
  max-width: none;
  margin: 0 auto;
  padding: 0.85rem 1.5rem;
}

.greedy-nav a {
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0;
  transition: color 0.2s ease;
}

.greedy-nav a:hover {
  color: var(--ink);
}

/* Main content area */
#main {
  width: min(80vw, 1280px);
  max-width: none;
  margin: 0 auto;
  padding: 4.25rem 1.5rem 5rem;
  background: transparent;
}

.page {
  float: none !important;
  width: 100% !important;
  margin: 0 !important;
  padding: 0 !important;
}

.page__inner-wrap,
.page__content {
  width: 100% !important;
}

/* Page title (hidden since we have custom header) */
.page__title {
  display: none;
}

/* Profile header */
.profile-name {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: clamp(2.7rem, 6vw, 4.9rem);
  font-weight: 500;
  color: var(--heading-green);

  letter-spacing: -0.055em;

}

.profile-section {

.profile-image {

}

.profile-image img {
  width: 150px;
  height: 150px;
  object-fit: cover;
  border-radius: 8px;

  border: 1px solid var(--line);

}

.profile-details {
  order: 1;
  display: flex;
  flex-wrap: wrap;

  font-weight: 400;
  color: var(--muted);
}

.profile-details p {
  display: inline-flex;

.profile-details p:not(:last-child)::after {

.profile-details a {

/* Section headings */
.page__content h2 {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

}

/* Horizontal rules */
.page__content hr {
  border: none;

}

/* Links */
a {

}

}

/* Tags / pills */
.tag, .category {

}

.tag:hover, .category:hover {

}

/* Page meta */
.page__meta {
  color: var(--secondary-text);
  font-size: 0.85rem;
  font-weight: 400;
}

.page__meta i {
  color: var(--accent-sage);
}

/* Taxonomy labels */
.page__taxonomy {
  margin-top: 1rem;
}

.page__taxonomy-item {
  display: inline-block;
}

/* Footer */
.page__footer {
  border-top: 1px solid var(--line);
  padding-top: 1.5rem;
  margin-top: 2rem;
}

.page__footer-follow .pagination {
  color: var(--secondary-text);
}

/* Buttons */
.btn {
  background: rgba(251, 248, 241, 0.55);
  color: var(--heading-green);
  border: 1px solid var(--border-sage);
  border-radius: 999px;
  padding: 0.5rem 1rem;
  font-size: 0.85rem;
  font-weight: 500;
  transition: all 0.2s ease;
}

.btn:hover {
  background: var(--paper-light);
  border-color: var(--heading-green);
  color: var(--heading-green);
}

/* Selection */
::selection {
  background: rgba(216, 208, 194, 0.8);
}

/* Focus states */
:focus-visible {
  outline: 2px solid var(--ink);
  outline-offset: 2px;
}

/* Research - Paper list */
.paper-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.paper-item {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  padding: 1.45rem 0;
  border-bottom: 1px solid var(--line);
}

.paper-item:first-child {
  padding-top: 0.5rem;
}

.paper-title {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 1.34rem;
  font-weight: 500;
  color: var(--heading-green);
  margin: 0;
  line-height: 1.25;
  letter-spacing: -0.03em;
}

.paper-meta-line {
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
  flex-wrap: wrap;
}

.paper-authors {
  font-size: 0.9rem;
  color: var(--body-charcoal);
  font-weight: 400;
}

.paper-authors strong {
  color: var(--ink);
  font-weight: 600;
}

.paper-venue {
  font-size: 0.82rem;
  color: var(--secondary-text);
  font-weight: 400;
}

.paper-status {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 0.15rem 0.5rem;

}

.status-accepted {
  color: var(--ink);

}

.status-submitted {
  color: var(--accent);

}

.status-progress {
  color: var(--secondary-text);
  background: rgba(251, 248, 241, 0.6);
  border: 1px solid var(--line);
}

.abstract-toggle {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: none;

  padding: 0;

}

.abstract-toggle:hover {

}

.abstract-arrow {

.abstract-content {

}

.abstract-content p {
  font-size: 0.82rem;
  line-height: 1.65;
  color: var(--secondary-text);
  margin: 0;
  max-width: none;
}

.paper-links {
  margin-top: 0.75rem;

.paper-link {

}

.paper-link:hover {

}

.education-timeline {

}

.edu-item {

}

.edu-dot {

}

.edu-line {
  width: 1.5px;
  flex: 1;
  background: var(--line);

}

.edu-item:last-child .edu-line {

}

.edu-content {

  flex-direction: column;
  gap: 0.15rem;
  padding-bottom: 1.75rem;

}

.edu-meta {
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
  margin-bottom: 0.1rem;
}

.edu-date {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--accent-sage);
  letter-spacing: 0.02em;
}

.edu-grade {
  font-size: 0.78rem;
  color: var(--secondary-text);
  font-weight: 400;
}

.edu-title {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 1.15rem;
  font-weight: 500;
  color: var(--heading-green);
  margin: 0;
  line-height: 1.3;
  letter-spacing: -0.025em;
}

.edu-venue {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--body-charcoal);
  margin: 0.1rem 0 0;
}

.edu-desc {
  font-size: 0.85rem;
  line-height: 1.65;
  color: var(--secondary-text);
  margin: 0.15rem 0 0;
}

.edu-courses {
  font-size: 0.82rem;
  line-height: 1.6;
  color: var(--secondary-text);
  margin: 0.1rem 0 0;
}

ul.edu-courses {
  list-style: none;
  padding: 0;
  margin: 0.15rem 0 0;
}

ul.edu-courses li {

}

ul.edu-courses li::before {
  content: "–";
  position: absolute;
  left: 0;
  color: var(--ink);
}

/* Ongoing Projects */
.project-item {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
  padding: 0.75rem 0;
}

.project-title {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 1.15rem;
  font-weight: 500;
  color: var(--heading-green);
  margin: 0;
  line-height: 1.3;
  letter-spacing: -0.025em;
}

.project-meta {
  font-size: 0.85rem;
  font-weight: 400;
  color: var(--accent-sage);
  margin: 0;
}

.project-desc {
  font-size: 0.85rem;
  line-height: 1.65;
  color: var(--secondary-text);
  margin: 0.1rem 0 0;
}

/* Responsive */
@media (max-width: 768px) {
  .profile-section {
    flex-direction: column;
    grid-template-columns: 1fr;
    align-items: start;
    text-align: left;
    gap: 1.5rem;
  }

  .profile-image {
    order: 1;
    justify-self: start;
  }

  .profile-details {
    order: 2;
    display: block;
  }

  .profile-image img {
    width: 132px;
    height: 132px;
  }

  .profile-details p {
    display: block;
    text-align: left;
    margin: 0.2rem 0;
  }

  .profile-details p:not(:last-child)::after {
    content: "";
    margin: 0;
  }

  #main {
    width: 100%;
    max-width: none;
    padding: 2rem 1rem;
  }

  .masthead__inner-wrap {
    width: 100%;
  }

  .profile-name {
    font-size: 2.35rem;
    text-align: left;
  }

  .paper-meta-line {
    flex-direction: column;
    gap: 0.25rem;
  }
}
/* Modern redesign overrides */
body {
  min-height: 100vh;
  overflow-x: hidden;
  background:
    radial-gradient(circle at 16% 12%, rgba(255, 252, 245, 0.95) 0, rgba(255, 252, 245, 0) 28rem),
    radial-gradient(circle at 88% 8%, rgba(214, 203, 184, 0.55) 0, rgba(214, 203, 184, 0) 24rem),

body::before {
