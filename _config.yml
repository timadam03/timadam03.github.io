locale: "en-US"
title: "Tim Lukas Adam"
name: "Tim Lukas Adam"
description: "Academic portfolio of Tim Lukas Adam, focused on LLMs, agents, and applied AI."
url: "https://timadam03.github.io"
baseurl: ""
repository: "timadam03/timadam03.github.io"
timezone: Etc/UTC

author:
  avatar: "profile.png"
  location: "Sonderborg / Hamburg"
  employer: "SDU University of Southern Denmark"
  email: "timlukas.adam@gmail.com"
  github: "timadam03"

include:
  - _pages
  - files

exclude:
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-cache
  - .sass-cache
  - CLAUDE.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - node_modules
  - package.json*
  - tmp
  - vendor

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
markdown: kramdown
highlighter: rouge
permalink: pretty

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  entity_output: as_char
  toc_levels: 1..6

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-sitemap

whitelist:
  - jekyll-sitemap
